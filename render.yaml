services:
  # ── Backend API (Express) ──────────────────────────────────────
  - type: web
    name: tclforge-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CLIENT_URL
        sync: false   # set to your frontend URL after first deploy

  # ── Frontend (React/Vite Static Site) ─────────────────────────
  - type: web
    name: tclforge
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false   # set to your backend URL after first deploy
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
